<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Comprehensive Chat Tutor Bot</title>
<style>

:root {
  --bg-light: #f9fbff;
  --bg-dark: #121212;
  --text-light: #333;
  --text-dark: #f0f0f0;
  --primary: #1a4bc3;
  --primary-dark: #133a9b;
  --card-light: #ffffff;
  --card-dark: #1e1e1e;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-light);
  color: var(--text-light);
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: background-color 0.3s, color 0.3s;
}

.dark-mode {
  background-color: var(--bg-dark);
  color: var(--text-dark);
}

header, footer {
  background-color: var(--primary);
  color: white;
  text-align: center;
  padding: 1rem;
  font-weight: bold;
}

main {
  flex: 1;
  max-width: 720px;
  margin: 20px auto;
  padding: 1.5rem;
  background: var(--card-light);
  border-radius: 12px;
  box-shadow: 0 0 18px rgba(0, 0, 0, 0.07);
  transition: background 0.3s;
}

.dark-mode main {
  background: var(--card-dark);
}

#chatBox {
  height: 400px;
  overflow-y: auto;
  padding: 15px;
  border-radius: 10px;
  background-color: var(--bg-light);
  border: 2px solid #d0d7e2;
  margin-bottom: 1rem;
  transition: background-color 0.3s;
}

.dark-mode #chatBox {
  background-color: #1a1a1a;
}

.message {
  margin: 12px 0;
  padding: 12px 18px;
  border-radius: 20px;
  max-width: 80%;
  line-height: 1.5;
  font-size: 1rem;
  word-wrap: break-word;
  animation: fadeIn 0.3s ease-in;
}

.user {
  background-color: var(--primary);
  color: white;
  margin-left: auto;
  text-align: right;
  border-bottom-right-radius: 5px;
}

.bot {
  background-color: #e0eaff;
  color: var(--text-light);
  margin-right: auto;
  text-align: left;
  border-bottom-left-radius: 5px;
}

.dark-mode .bot {
  background-color: #2b2b2b;
  color: var(--text-dark);
}

input[type="text"] {
  width: 68%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s;
}

input[type="text"]:focus {
  border-color: var(--primary);
}

button {
  width: 28%;
  padding: 12px;
  font-weight: 600;
  background-color: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  transition: background-color 0.3s;
}

button:hover {
  background-color: var(--primary-dark);
}

.clear-btn {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #999;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
}

.clear-btn:hover {
  background: #666;
}

.toggle-dark {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #222;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
}

.toggle-dark:hover {
  background: #444;
}

@media screen and (max-width: 600px) {
  input[type="text"] {
    width: 100%;
    margin-bottom: 10px;
  }

  button {
    width: 100%;
  }

  #chatBox {
    height: 300px;
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}</style>
</head>
<body>

<header>
  <h1>Comprehensive Chat Tutor Bot</h1>
  <p>Ask me anything in English or Afaan Oromoo!</p>
</header>

<main>
  <h2>Chat with your Tutor 🤖</h2>
  <div id="chatBox">
    <div class="message bot">👋 Hello! I'm your Chat Tutor. How can I help you today?</div>
  </div>
  <input type="text" id="userInput" placeholder="Type your question here..." autocomplete="off" />
  <button onclick="sendMessage()">Send</button>
</main>

<footer>
  <p>&copy; 2025 AIBSBSS - Smart Education for Everyone</p>
</footer>

<script>
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');

  function sendMessage() {
    const msg = userInput.value.trim();
    if (!msg) return;
    appendMessage(msg, 'user');
    const reply = getBotReply(msg);
    setTimeout(() => {
      appendMessage(reply, 'bot');
      chatBox.scrollTop = chatBox.scrollHeight;
    }, 600);
    userInput.value = '';
  }

  function appendMessage(text, sender) {
    const div = document.createElement('div');
    div.classList.add('message', sender);
    div.textContent = (sender === 'user' ? '👩‍🎓 ' : '🤖 ') + text;
    chatBox.appendChild(div);
  }
