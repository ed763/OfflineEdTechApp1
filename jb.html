<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clean AI Mind Map + 3D</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
  textarea { width: 100%; height: 150px; padding: 10px; border-radius: 8px; font-size: 16px; }
  button { padding: 10px 20px; margin-top: 10px; background: #3aafa9; color: white; border: none; border-radius: 5px; cursor: pointer; }
  .container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
  .mindmap-area { position: relative; width: 600px; height: 600px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  .node { position: absolute; padding: 10px 15px; background: #3aafa9; color: white; border-radius: 8px; cursor: pointer; text-align: center; user-select: none; transition: transform 0.2s ease; }
  .node:hover { transform: scale(1.1); }
  .line { position: absolute; height: 2px; background: #555; transform-origin: left center; }
  .description-box { width: 300px; background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); font-size: 14px; display: none; }
  .description-box h3 { margin-top: 0; color: #2b7a78; }
  /* 3D Models */
  .dna, .molecule { margin-top: 20px; }
  .dna { width: 60px; height: 180px; margin: auto; perspective: 700px; }
  .helix { width: 60px; height: 180px; position: absolute; animation: spin 7s linear infinite; transform-style: preserve-3d; }
  .strand { width: 15px; height: 180px; background: linear-gradient(to bottom, #3aafa9, #2b7a78); border-radius: 10px; position: absolute; }
  .strand.right { left: 45px; }
  .rung { width: 30px; height: 5px; background: #3aafa9; position: absolute; left: 15px; border-radius: 4px; }
  @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
  .molecule { width: 120px; height: 100px; position: relative; margin: auto; }
  .atom { width: 50px; height: 50px; border-radius: 50%; background: #fe6f5e; position: absolute; }
  .atom.oxygen { background: #3aafa9; left: 35px; top: 25px; }
  .atom.hydrogen1 { left: 0; top: 0; }
  .atom.hydrogen2 { left: 70px; top: 0; }
  .bond { position: absolute; height: 6px; background: #555; border-radius: 3px; top: 40px; width: 35px; }
  .bond.bond1 { left: 18px; transform: rotate(30deg); }
  .bond.bond2 { left: 67px; transform: rotate(-30deg); }
</style>
</head>
<body>

<h3>Paste Your Notes Below:</h3>
<textarea id="fullNote" placeholder="Type your full note here..."></textarea>
<button onclick="generateMindMap()">Generate Mind Map</button>

<div class="container">
  <div>
    <h2>Mind Map</h2>
    <div class="mindmap-area" id="mindmapArea"></div>
  </div>
  <div class="description-box" id="descriptionBox">
    <h3 id="descTitle"></h3>
    <p id="descContent"></p>
    <div id="dnaModel" class="dna" style="display:none;">
      <div class="helix">
        <div class="strand"></div>
        <div class="strand right"></div>
        <div class="rung" style="top:20px;"></div>
        <div class="rung" style="top:40px;"></div>
        <div class="rung" style="top:60px;"></div>
        <div class="rung" style="top:80px;"></div>
        <div class="rung" style="top:100px;"></div>
      </div>
    </div>
    <div id="waterModel" class="molecule" style="display:none;">
      <div class="atom hydrogen1"></div>
      <div class="bond bond1"></div>
      <div class="atom oxygen"></div>
      <div class="bond bond2"></div>
      <div class="atom hydrogen2"></div>
    </div>
  </div>
</div>

<script>
const keywords = ['dna', 'water', 'cell', 'photosynthesis', 'mitochondria', 'respiration', 'industrial', 'revolution', 'heart', 'digestive', 'helix', 'h2o'];
const stopWords = ['the','is','and','of','to','in','a','with','for','on','an','at','by','this','that','it','as','from','be'];

function generateMindMap() {
  const note = document.getElementById('fullNote').value.toLowerCase();
  const mindmapArea = document.getElementById('mindmapArea');
  mindmapArea.innerHTML = '';
  document.getElementById('descriptionBox').style.display = 'none';

  let foundKeywords = keywords.filter(k => note.includes(k));

  if (foundKeywords.length === 0) {
    mindmapArea.innerHTML = '<p style="text-align:center; margin-top:50%;">No keywords found in your note.</p>';
    return;
  }

  const centerX = mindmapArea.offsetWidth / 2;
  const centerY = mindmapArea.offsetHeight / 2;
  const radius = 200;
  const angleStep = (2 * Math.PI) / foundKeywords.length;

  foundKeywords.forEach((topic, i) => {
    const angle = i * angleStep;
    const x = centerX + radius * Math.cos(angle) - 60;
    const y = centerY + radius * Math.sin(angle) - 30;
    const node = createNode(topic, x, y);
    mindmapArea.appendChild(node);

    drawLine(centerX, centerY, x + 60, y + 30, mindmapArea);

    node.addEventListener('click', () => {
      showDescription(topic, note);
    });
  });
}

function createNode(text, left, top) {
  const node = document.createElement('div');
  node.className = 'node';
  node.style.left = left + 'px';
  node.style.top = top + 'px';
  node.textContent = text;
  return node;
}

function drawLine(x1, y1, x2, y2, container) {
  const length = Math.hypot(x2 - x1, y2 - y1);
  const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

  const line = document.createElement('div');
  line.className = 'line';
  line.style.width = length + 'px';
  line.style.left = x1 + 'px';
  line.style.top = y1 + 'px';
  line.style.transform = `rotate(${angle}deg)`;
  container.appendChild(line);
}

function showDescription(topic, note) {
  const sentences = note.match(/[^.!?]+[.!?]?/g) || [note];
  const related = sentences.filter(s => s.includes(topic)).join(' ');

  document.getElementById('descTitle').textContent = topic;
  document.getElementById('descContent').textContent = related || 'No detailed content.';
  document.getElementById('descriptionBox').style.display = 'block';

  document.getElementById('dnaModel').style.display = /dna|helix/.test(topic) ? 'block' : 'none';
  document.getElementById('waterModel').style.display = /water|h2o/.test(topic) ? 'block' : 'none';
}
</script>

</body>
</html>
