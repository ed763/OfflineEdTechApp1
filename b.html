<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mind Map + 3D Models</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #e0f7f7;
    margin: 0;
    overflow: hidden;
    color: #15394a;
  }

  .ui-panel {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 320px;
    background: #ffffffdd;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    z-index: 15;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    resize: vertical;
    border-radius: 8px;
    border: 1.5px solid #3aafa9;
    padding: 12px 15px;
    font-size: 15px;
    font-weight: 400;
    color: #15394a;
    outline-offset: 3px;
    transition: outline-color 0.3s ease;
  }

  textarea:focus {
    outline: 3px solid #2b7a78;
  }

  button {
    width: 100%;
    margin-top: 12px;
    background: #3aafa9;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: 600;
    font-size: 17px;
    padding: 12px 0;
    cursor: pointer;
    box-shadow: 0 5px 12px #2b7a78aa;
    transition: background-color 0.25s ease;
  }

  button:hover {
    background: #2b7a78;
  }

  .mindmap-container {
    position: fixed;
    top: 0;
    left: 350px;
    width: calc(60% - 40px);
    height: 100vh;
    background: #ffffffee;
    box-shadow: inset 0 0 15px #3aafa9aa;
    border-radius: 20px;
    padding: 20px;
    overflow: visible;
    perspective: 1200px;
  }

  .mindmap {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
  }

  .node {
    position: absolute;
    padding: 12px 18px;
    background: linear-gradient(145deg, #3aafa9, #2b7a78);
    color: white;
    border-radius: 14px;
    cursor: pointer;
    text-align: center;
    font-weight: 600;
    font-size: 16px;
    user-select: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    transition: transform 0.15s ease, box-shadow 0.25s ease;
  }

  .node:hover {
    transform: scale(1.12);
    box-shadow: 0 7px 20px rgba(0,0,0,0.35);
  }

  .description-box {
    position: fixed;
    top: 100px;
    right: 20px;
    width: 320px;
    max-height: 40vh;
    background: #ffffffee;
    border-radius: 14px;
    padding: 22px 25px;
    box-shadow: 0 10px 22px rgba(0,0,0,0.2);
    font-size: 15px;
    overflow-y: auto;
    user-select: text;
  }

  .description-box h3 {
    margin-top: 0;
    color: #2b7a78;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.03em;
  }

  .model-container {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 320px;
    height: 320px;
    background: #ffffffcc;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    perspective: 1400px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  .model {
    width: 280px;
    height: 280px;
    transform-style: preserve-3d;
    transition: transform 0.15s ease;
  }

  .dna-helix {
    width: 12px;
    height: 240px;
    background: repeating-linear-gradient(
      45deg,
      #1e90ff,
      #1e90ff 8px,
      #ff2d55 8px,
      #ff2d55 16px
    );
    border-radius: 10px;
    transform-origin: center;
    animation: spinHelix 6s linear infinite;
    margin: auto;
    box-shadow: 0 0 20px #1e90ffaa;
  }

  .heart {
    width: 120px;
    height: 110px;
    background: #ff4d6d;
    position: relative;
    transform: rotate(-45deg);
    animation: heartbeat 1.2s ease-in-out infinite;
    margin: auto;
    box-shadow: 0 0 15px #ff4d6daa;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 110px;
    background: #ff4d6d;
    border-radius: 60px 60px 0 0;
  }

  .heart::before {
    top: -65px;
    left: 0;
  }

  .heart::after {
    left: 65px;
    top: 0;
  }

  .digestive {
    width: 140px;
    height: 230px;
    background: #ffcba4;
    border-radius: 70px;
    position: relative;
    margin: auto;
    box-shadow: inset 0 0 30px #d97c4baa;
  }

  .digestive::after {
    content: "";
    width: 26px;
    height: 120px;
    background: #b76b43;
    position: absolute;
    top: 65px;
    left: 60px;
    border-radius: 10px;
  }

  @keyframes spinHelix {
    from {
      transform: rotateY(0deg);
    }
    to {
      transform: rotateY(360deg);
    }
  }

  @keyframes heartbeat {
    0%,
    100% {
      transform: scale(1) rotate(-45deg);
    }
    50% {
      transform: scale(1.15) rotate(-45deg);
    }
  }

  /* Scrollbar for description box */
  .description-box::-webkit-scrollbar {
    width: 7px;
  }
  .description-box::-webkit-scrollbar-thumb {
    background: #3aafa9cc;
    border-radius: 5px;
  }
  .description-box::-webkit-scrollbar-track {
    background: transparent;
  }

  /* Lines */
  .line {
    position: absolute;
    height: 2px;
    background: #3aafa9cc;
    transform-origin: left center;
    border-radius: 1px;
    pointer-events: none;
    box-shadow: 0 0 4px #3aafa9cc;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .ui-panel {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
      box-shadow: none;
      background: #ffffffee;
      border-radius: 0;
      padding: 15px 10px;
      top: 0;
      left: 0;
    }
    .mindmap-container {
      position: relative;
      width: 100%;
      height: 60vh;
      left: 0;
      border-radius: 12px;
      margin-bottom: 20px;
      padding: 10px;
      box-shadow: none;
      overflow-x: scroll;
    }
    .description-box {
      position: relative;
      width: 100%;
      max-height: 30vh;
      margin: 0 0 20px 0;
      border-radius: 12px;
      padding: 15px;
      box-shadow: none;
      overflow-y: auto;
    }
    .model-container {
      position: relative;
      width: 100%;
      height: 280px;
      margin: 0 auto;
      bottom: auto;
      right: auto;
      border-radius: 12px;
      box-shadow: none;
    }
  }
</style>
</head>
<body>

<div class="ui-panel">
  <textarea
    id="fullNote"
    placeholder="Write or paste your full notes here... (DNA, Heart, Digestive...)"
  ></textarea>
  <button onclick="generateMindMap()">Generate Mind Map + Models</button>
</div>

<div class="mindmap-container" id="mindmapContainer">
  <div class="mindmap" id="mindmap"></div>
</div>

<div class="description-box" id="descriptionBox" style="display:none;">
  <h3 id="descTitle">Topic</h3>
  <p id="descContent"></p>
</div>

<div class="model-container" id="modelContainer">
  <!-- 3D Model will appear here -->
</div>

<script>
  const stopWords = [
    "the",
    "is",
    "and",
    "of",
    "to",
    "in",
    "a",
    "with",
    "for",
    "on",
    "an",
    "at",
    "by",
    "this",
    "that",
    "it",
    "as",
    "from",
    "be",
    "are",
    "was",
    "were",
  ];

  // Helper to capitalize first letter
  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function generateMindMap() {
    const note = document.getElementById("fullNote").value.trim();
    if (!note) return alert("Please enter your note.");

    const mindmap = document.getElementById("mindmap");
    const mindmapContainer = document.getElementById("mindmapContainer");
    mindmap.innerHTML = "";
    // Remove old lines
    document.querySelectorAll(".line").forEach(line => line.remove());

    document.getElementById("descriptionBox").style.display = "none";
    document.getElementById("modelContainer").innerHTML = "";

    const wordFreq = {};
    const sentences = note.match(/[^.!?]+[.!?]?/g) || [note];

    sentences.forEach((sentence) => {
      const words = sentence.toLowerCase().match(/\b\w+\b/g);
      if (words) {
        words.forEach((word) => {
          if (!stopWords.includes(word)) {
            if (!wordFreq[word]) wordFreq[word] = { count: 0, sentences: [] };
            wordFreq[word].count++;
            wordFreq[word].sentences.push(sentence.trim());
          }
        });
      }
    });

    const sortedWords = Object.keys(wordFreq)
      .sort((a, b) => wordFreq[b].count - wordFreq[a].count)
      .slice(0, 6);

    // Center node
    const centerX = mindmapContainer.clientWidth / 2;
    const centerY = mindmapContainer.clientHeight / 2;

    // Create center main node
    const mainNode = document.createElement("div");
    mainNode.className = "node";
    mainNode.textContent = "Main";
    mainNode.style.left = centerX - 60 + "px";
    mainNode.style.top = centerY - 30 + "px";
    mindmap.appendChild(mainNode);

    // Draw outer topic nodes + lines
    const radius = 180;
    const angleStep = (2 * Math.PI) / sortedWords.length;

    sortedWords.forEach((topic, i) => {
      const angle = i * angleStep;
      const x = centerX + radius * Math.cos(angle) - 60;
      const y = centerY + radius * Math.sin(angle) - 30;

      const node = document.createElement("div");
      node.className = "node";
      node.style.left = x + "px";
      node.style.top = y + "px";
      node.textContent = capitalize(topic);
      node.addEventListener("click", () =>
        showDescription(topic, wordFreq[topic].sentences.join(" "))
      );
      mindmap.appendChild(node);

      drawLine(mainNode, node, mindmapContainer);
    });
  }

  // Draw a line connecting two nodes inside container
  function drawLine(n1, n2, container) {
    const r1 = n1.getBoundingClientRect();
    const r2 = n2.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();

    const x1 = r1.left + r1.width / 2 - containerRect.left;
    const y1 = r1.top + r1.height / 2 - containerRect.top;
    const x2 = r2.left + r2.width / 2 - containerRect.left;
    const y2 = r2.top + r2.height / 2 - containerRect.top;

    const length = Math.hypot(x2 - x1, y2 - y1);
    const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);

    const line = document.createElement("div");
    line.className = "line";
    line.style.width = length + "px";
    line.style.left = x1 + "px";
    line.style.top = y1 + "px";
    line.style.transform = `rotate(${angle}deg)`;
    container.appendChild(line);
  }

  function showDescription(title, content) {
    document.getElementById("descTitle").textContent = capitalize(title);
    document.getElementById("descContent").textContent = content;
    document.getElementById("descriptionBox").style.display = "block";

    const container = document.getElementById("modelContainer");
    container.innerHTML = "";
    const modelDiv = document.createElement("div");
    modelDiv.className = "model";

    if (title.includes("dna")) {
      const dna = document.createElement("div");
      dna.className = "dna-helix";
      modelDiv.appendChild(dna);
    } else if (title.includes("heart")) {
      const heart = document.createElement("div");
      heart.className = "heart";
      modelDiv.appendChild(heart);
    } else if (title.includes("digestive")) {
      const digestive = document.createElement("div");
      digestive.className = "digestive";
      modelDiv.appendChild(digestive);
    } else {
      modelDiv.innerHTML =
        '<p style="color:gray; text-align:center; margin-top: 130px;">No 3D Model Available</p>';
    }

    container.appendChild(modelDiv);

    // Attempt Text-to-Speech if supported (silently skip if not)
    if ("speechSynthesis" in window) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(content);
      utterance.lang = "en-US";
      window.speechSynthesis.speak(utterance);
    }
  }
</script>
</body>
</html>
