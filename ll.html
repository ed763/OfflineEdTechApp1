<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline Group Study</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eaeff2;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    textarea {
      width: 100%;
      height: 90px;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: #2a9d8f;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px 0;
    }

    button:hover {
      background: #21867a;
    }

    .chat-bubble {
      background: #ffffff;
      padding: 15px;
      margin: 10px 0;
      border-radius: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #resultArea {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .label {
      font-weight: bold;
      color: #444;
    }
  </style>
</head>
<body>
  <h2>📚 Offline Group Study — Telegram Style</h2>

  <!-- Step 1: Input -->
  <textarea id="quizInput" placeholder="Write your quiz here..."></textarea>
  <textarea id="ideaInput" placeholder="Write your idea/answer here..."></textarea>

  <button onclick="generateCombinedCode()">🔗 Share With Group</button>
  <textarea id="combinedCode" readonly placeholder="Share this code with others..."></textarea>

  <!-- Step 2: Load from code (optional) -->
  <h3>📥 Paste Code (Optional)</h3>
  <textarea id="pasteCombinedCode" placeholder="Paste code here... (if not loaded automatically)"></textarea>
  <button onclick="loadCombined()">📖 Load Shared Message</button>

  <!-- Step 3: Auto-loaded or Shared -->
  <div id="resultArea">
    <div class="chat-bubble" id="quizOutput"></div>
    <div class="chat-bubble" id="ideaOutput"></div>
  </div>

  <script>
    // 🔁 Auto-load on page open
    window.onload = function () {
      const saved = localStorage.getItem("sharedQuizIdeaCode");
      if (saved) {
        try {
          const decoded = atob(saved);
          const data = JSON.parse(decoded);
          showData(data);
        } catch {
          // corrupted or invalid data
        }
      }
    };

    function generateCombinedCode() {
      const quiz = document.getElementById("quizInput").value.trim();
      const idea = document.getElementById("ideaInput").value.trim();

      if (quiz === "" || idea === "") {
        alert("⚠️ Please fill both the quiz and idea.");
        return;
      }

      const combined = JSON.stringify({ quiz: quiz, idea: idea });
      const code = btoa(combined);

      document.getElementById("combinedCode").value = code;
      localStorage.setItem("sharedQuizIdeaCode", code); // Save it
      showData({ quiz, idea });
    }

    function loadCombined() {
      const code = document.getElementById("pasteCombinedCode").value.trim();
      try {
        const decoded = atob(code);
        const data = JSON.parse(decoded);

        document.getElementById("combinedCode").value = code;
        localStorage.setItem("sharedQuizIdeaCode", code); // Save for future auto load
        showData(data);
      } catch {
        alert("❌ Invalid code!");
      }
    }

    function showData(data) {
      document.getElementById("quizOutput").innerHTML = `<span class='label'>📘 Group Quiz:</span><br>${data.quiz}`;
      document.getElementById("ideaOutput").innerHTML = `<span class='label'>💡 Shared Idea:</span><br>${data.idea}`;
    }
  </script>
</body>
</html>
