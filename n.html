<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline AI Chatbot</title>
  <style>
    body {
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #333;
    }

    #chatBox {
      width: 90%;
      max-width: 600px;
      height: 400px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #userInput {
      width: 90%;
      max-width: 600px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .danger {
      background-color: #d9534f;
      margin-left: 10px;
    }

    .chat-entry {
      margin-bottom: 10px;
    }

    .user {
      font-weight: bold;
      color: #1a73e8;
    }

    .bot {
      font-style: italic;
      color: #333;
    }
  </style>
</head>
<body>
  <h2>📚 Offline AI Chatbot for Students</h2>

  <div id="chatBox"></div>

  <input type="text" id="userInput" placeholder="Ask me anything about school subjects..." />
  <div>
    <button onclick="sendMessage()">Send</button>
    <button class="danger" onclick="clearHistory()">Clear History</button>
  </div>

  <script src="high_school_chatbot.js"></script>
  <script>
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('userInput');

    function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      appendMessage('You', msg, 'user');
      const response = offlineChatbot(msg.toLowerCase());
      appendMessage('Bot', response, 'bot');
      saveToHistory(msg, response);
      input.value = '';
    }

    function appendMessage(sender, text, className) {
      const p = document.createElement('p');
      p.className = `chat-entry ${className}`;
      p.innerHTML = `<span class="${className}">${sender}:</span> ${text}`;
      chatBox.appendChild(p);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function saveToHistory(userMsg, botMsg) {
      const history = JSON.parse(localStorage.getItem('chatHistory')) || [];
      history.push({ user: userMsg, bot: botMsg });
      localStorage.setItem('chatHistory', JSON.stringify(history));
    }

    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('chatHistory')) || [];
      history.forEach(entry => {
        appendMessage('You', entry.user, 'user');
        appendMessage('Bot', entry.bot, 'bot');
      });
    }

    function clearHistory() {
      localStorage.removeItem('chatHistory');
      chatBox.innerHTML = '';
    }

    loadHistory();
  </script>
</body>
</html>
